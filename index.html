<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criador de Personagens IA</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
.container{max-width:600px;margin:auto}
select,input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#22c55e;color:white;font-weight:bold;cursor:pointer}
img{margin-top:20px;max-width:100%;border-radius:12px}
</style>
</head>
<body>
<div class="container">
<h1>Gerador de Personagens com IA</h1>
<p>Descreva seu personagem e escolha o estilo</p><select id="estilo">
<option value="anime">Anime</option>
<option value="robo">Robô</option>
<option value="fantasia">Fantasia</option>
<option value="2d">2D</option>
<option value="terror">Terror</option>
</select><input id="descricao" placeholder="Ex: guerreiro com espada gigante e armadura preta"><button onclick="gerarPersonagem()">Gerar Personagem</button>

<img id="resultado"/>
</div><script>
async function gerarPersonagem(){
const estilo=document.getElementById('estilo').value
const descricao=document.getElementById('descricao').value

const prompt=`${estilo} personagem ${descricao}`

const url=`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`

const img=document.getElementById('resultado')
img.src=url
}
</script></body>
</html>
